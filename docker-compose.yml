# Local Postgres for development. Treat as a stand-in for the RDS instance
# we'll connect to from EKS later — same DATABASE_URL env-var contract.
#
# Usage:
#   docker compose up -d         # start postgres in the background
#   docker compose down          # stop (preserves the named volume)
#   docker compose down -v       # stop and wipe data
services:
  postgres:
    image: postgres:16-alpine
    container_name: code-agents-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: code_agents
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d code_agents']
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: code-agents-otel-collector
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      CX_DOMAIN: ${CX_DOMAIN}
      CX_PRIVATE_KEY: ${CX_PRIVATE_KEY}
      CX_APPLICATION_NAME: ${CX_APPLICATION_NAME}
      CX_SUBSYSTEM_NAME: ${CX_SUBSYSTEM_NAME}
    ports:
      - '4317:4317'
      - '4318:4318'

volumes:
  postgres-data:
